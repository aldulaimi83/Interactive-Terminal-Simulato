<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Linxe - Learn Linux the Fun Way</title>

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/xterm/5.5.0/xterm.min.css"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>🐧 Linxe</h1>
    <p>Master Linux — Realistic Terminal</p>
  </header>

  <main>
    <section class="hero">
      <h2>Click inside the terminal below and start typing!</h2>
      <button id="focusBtn" type="button">Focus Terminal</button>
    </section>

    <section id="terminal-section">
      <h2>🖥️ Realistic Linux Terminal</h2>

      <div class="terminal-wrapper">
        <div id="terminal"></div>
      </div>

      <div class="actions">
        <button id="resetBtn" type="button" class="reset-btn">
          Reset Terminal
        </button>
      </div>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xterm/5.5.0/xterm.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xterm/5.5.0/addons/fit/fit.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
